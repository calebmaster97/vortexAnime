<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>VortexAnime – Anime Browser</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />

<style>
/* ============================================================
   VARIABLE THEME SYSTEM
   ============================================================ */
:root {
  --bg: #0d0f14;
  --card: rgba(255, 255, 255, 0.05);
  --glass: rgba(255, 255, 255, 0.06);
  --border: rgba(255, 255, 255, 0.15);
  --text: #f3f6fa;
  --muted: #9ca7b8;
  --accent: #7aa2ff;
  --accent2: #8bd8ff;
  --round: 14px;
  --blur: 18px;
}

/* Theme: Crimson */
body.theme-crimson {
  --bg: #0f0505;
  --accent: #ff4d4d;
  --accent2: #ff8080;
  --border: rgba(255, 77, 77, 0.2);
  background: radial-gradient(circle at top, #1a0808, #0f0505);
}

/* Theme: Emerald */
body.theme-emerald {
  --bg: #050f0a;
  --accent: #4dff88;
  --accent2: #80ffaa;
  --border: rgba(77, 255, 136, 0.2);
  background: radial-gradient(circle at top, #081a10, #050f0a);
}

/* Theme: Midnight */
body.theme-midnight {
  --bg: #000000;
  --card: #0a0a0a;
  --border: #222;
  --accent: #ffffff;
  --accent2: #aaaaaa;
  background: #000;
}

* { box-sizing: border-box; font-family: "Inter", Arial, sans-serif; transition: all 0.3s ease; }

body {
  margin: 0;
  background: radial-gradient(circle at top, #151922, #0d0f14);
  color: var(--text);
  min-height: 100vh;
}

header { text-align: center; padding: 40px 10px; }
header h1 {
  font-size: 3.5rem; margin: 0;
  background: linear-gradient(90deg, var(--accent), var(--accent2));
  -webkit-background-clip: text; color: transparent; letter-spacing: -2px;
}

.controls {
  display: flex; gap: 12px; padding: 18px; flex-wrap: wrap;
  justify-content: center; background: var(--glass);
  border: 1px solid var(--border); backdrop-filter: blur(var(--blur));
  border-radius: var(--round); margin: 0 auto 30px auto;
  width: clamp(260px, 95%, 1200px);
}

.controls select, .controls input, .controls button {
  padding: 12px 16px; border-radius: var(--round);
  background: rgba(255, 255, 255, 0.07); border: 1px solid var(--border);
  color: var(--text); font-size: 0.95rem; outline: none;
}

button { cursor: pointer; font-weight: 600; background: rgba(255, 255, 255, 0.1); }
button:hover { border-color: var(--accent); transform: translateY(-2px); }

.filter-btn.active { background: var(--accent); color: #000; box-shadow: 0 0 15px var(--accent); }

.grid {
  padding: 20px; display: grid; gap: 25px;
  grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  width: clamp(260px, 95%, 1500px); margin: auto;
}

.card {
  background: var(--card); border-radius: var(--round);
  border: 1px solid var(--border); overflow: hidden;
  backdrop-filter: blur(var(--blur)); display: flex; flex-direction: column;
}

.card img { width: 100%; aspect-ratio: 2/3; object-fit: cover; }
.content { padding: 15px; flex-grow: 1; }
.title { font-size: 1.1rem; font-weight: 700; margin-bottom: 6px; }

.timer-tag {
  font-size: 0.75rem; font-weight: 800; color: #000;
  background: var(--accent); padding: 4px 8px;
  border-radius: 6px; display: inline-block; margin-top: 8px;
}

@media (max-width: 800px) { .controls { flex-direction: column; } }
</style>
</head>
<body id="mainBody">

<header>
  <h1>VortexAnime</h1>
  <p>Universal Anime Discovery</p>
</header>

<div class="controls">
  <select id="themeSelect">
    <option value="">Vortex (Blue)</option>
    <option value="theme-crimson">Crimson (Red)</option>
    <option value="theme-emerald">Emerald (Green)</option>
    <option value="theme-midnight">Midnight (White/Black)</option>
  </select>
  <input id="search" type="text" placeholder="Search title..." />
  <select id="genre">
    <option value="">All Genres</option>
    <option value="Action">Action</option>
    <option value="Adventure">Adventure</option>
    <option value="Comedy">Comedy</option>
    <option value="Drama">Drama</option>
    <option value="Fantasy">Fantasy / Isekai</option>
    <option value="Horror">Horror</option>
    <option value="Josei">Josei</option>
    <option value="Mahou Shoujo">Magical Girl</option>
    <option value="Mecha">Mecha</option>
    <option value="Romance">Romance</option>
    <option value="Sci-Fi">Sci-Fi</option>
    <option value="Shoujo">Shoujo</option>
    <option value="Shounen">Shounen</option>
    <option value="Slice of Life">Slice of Life</option>
    <option value="Sports">Sports</option>
    <option value="Supernatural">Supernatural</option>
    <option value="Thriller">Thriller</option>
  </select>
  <button id="airingBtn" class="filter-btn">Airing</button>
  <button id="upcomingBtn" class="filter-btn">Upcoming</button>
  <button id="refresh">Refresh</button>
</div>

<div id="grid" class="grid"></div>

<script>
  const grid = document.getElementById("grid");
  const themeSelect = document.getElementById("themeSelect");
  const genreSel = document.getElementById("genre");
  const searchInput = document.getElementById("search");
  const airingBtn = document.getElementById("airingBtn");
  const upcomingBtn = document.getElementById("upcomingBtn");

  let currentStatus = undefined;

  // Theme Logic
  themeSelect.onchange = () => {
    document.body.className = themeSelect.value;
  };

  async function fetchAnime() {
    grid.innerHTML = "<p style='grid-column: 1/-1; text-align: center; opacity: 0.5;'>Scanning...</p>";
    const query = `
      query ($search: String, $genre: String, $status: MediaStatus) {
        Page(perPage: 24) {
          media(search: $search, genre: $genre, status: $status, type: ANIME, isAdult: false, sort: POPULARITY_DESC) {
            title { english romaji }
            coverImage { extraLarge }
            genres
            siteUrl
            nextAiringEpisode { airingAt episode }
          }
        }
      }
    `;
    const variables = {
      search: searchInput.value || undefined,
      genre: genreSel.value === "Fantasy / Isekai" ? "Fantasy" : (genreSel.value || undefined),
      status: currentStatus
    };

    try {
      const response = await fetch('https://graphql.anilist.co', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ query, variables })
      });
      const result = await response.json();
      grid.innerHTML = "";
      result.data.Page.media.forEach(anime => {
        const div = document.createElement("div");
        div.className = "card";
        let timerHtml = anime.nextAiringEpisode ? 
          `<div class="timer-tag" data-time="${anime.nextAiringEpisode.airingAt}">Ep ${anime.nextAiringEpisode.episode}: Loading...</div>` : "";
        
        div.innerHTML = `
          <img src="${anime.coverImage.extraLarge}" loading="lazy">
          <div class="content">
            <div class="title">${anime.title.english || anime.title.romaji}</div>
            <div style="font-size: 0.8rem; color: var(--muted);">${anime.genres[0]}</div>
            ${timerHtml}
            <a href="${anime.siteUrl}" target="_blank" style="color: var(--accent); text-decoration: none; font-weight: bold; font-size: 0.9rem; margin-top: 10px; display: block;">View Details</a>
          </div>
        `;
        grid.appendChild(div);
      });
      startTimers();
    } catch (err) { grid.innerHTML = "Error!"; }
  }

  function startTimers() {
    setInterval(() => {
      document.querySelectorAll('.timer-tag').forEach(tag => {
        const diff = parseInt(tag.dataset.time) - Math.floor(Date.now() / 1000);
        if (diff > 0) {
          const d = Math.floor(diff / 86400), h = Math.floor((diff % 86400) / 3600), m = Math.floor((diff % 3600) / 60);
          tag.innerText = `Next: ${d}d ${h}h ${m}m`;
        } else { tag.innerText = "Aired!"; }
      });
    }, 60000);
  }

  airingBtn.onclick = () => { currentStatus = currentStatus === "RELEASING" ? undefined : "RELEASING"; updateBtnState(); fetchAnime(); };
  upcomingBtn.onclick = () => { currentStatus = currentStatus === "NOT_YET_RELEASED" ? undefined : "NOT_YET_RELEASED"; updateBtnState(); fetchAnime(); };
  
  function updateBtnState() {
    airingBtn.classList.toggle("active", currentStatus === "RELEASING");
    upcomingBtn.classList.toggle("active", currentStatus === "NOT_YET_RELEASED");
  }

  genreSel.onchange = fetchAnime;
  searchInput.oninput = () => { clearTimeout(window.timer); window.timer = setTimeout(fetchAnime, 600); };
  fetchAnime();
</script>
</body>
</html>
